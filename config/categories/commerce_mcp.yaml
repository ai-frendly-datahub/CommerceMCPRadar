- id: mcp_candidate_hmmhmmhm_daiso_mcp
  name: hmmhmmhm/daiso-mcp
  type: mcp_server
  enabled: true
  url: https://github.com/hmmhmmhm/daiso-mcp
  transport: streamable_http
  trust_tier: T4_community
  collection_tier: C4_mcp_tool
  content_type: mcp_tool_result
  risk_scope:
  - network_read
  notes: >-
    Fake stdio transport smoke passed with the original allowlisted Daiso read
    tools on 2026-04-29. npm package metadata cross-check passed on 2026-04-29.
    Node 20 override showed the npm package is a CLI wrapper, not a stdio MCP
    server; the CLI exposes https://mcp.aka.page/mcp as a remote MCP endpoint.
    Real streamable HTTP smoke passed on 2026-04-29 for product search, store
    search, and price lookup. Inventory and display location calls returned 403
    Unauthorized with sample IDs, so they remain out of the production
    allowlist. Remote endpoint registry/risk review passed with scope limits on
    2026-04-29: the endpoint exposes 32 tools across multiple retail/venue
    domains, but the configured Daiso allowlist has no missing tools or prefix
    drift. Source is active under controlled rollout guardrails.
    Controlled collector-path canary passed with warnings on 2026-04-29: 11
    normalized articles were produced from the three configured tools with no
    exact fallback links and no hard failures, but one product appears in both
    search and price outputs, producing one duplicate title/link pair that
    was removed by canonical link deduplication before broader rollout.
    Enablement decision package was built on 2026-04-29 and found the candidate
    ready for controlled enablement review. Controlled rollout was activated on
    2026-04-29 after a preflight canary passed within the configured guardrails.
  config:
    repository: hmmhmmhm/daiso-mcp
    source_seed: awesome-mcp-korea
    source_section: Commerce & Retail
    activation_status: real_transport_smoke_test_passed
    activation_audited_at: '2026-04-29T09:44:35+00:00'
    fake_transport_smoke_tested_at: '2026-04-29T07:14:18+00:00'
    stdio_transport_probe_failed_at: '2026-04-29T09:27:12+00:00'
    real_transport_smoke_tested_at: '2026-04-29T09:44:35+00:00'
    transport_mode_confirmed_at: '2026-04-29T09:44:35+00:00'
    transport_mode_summary: daiso@1.0.4 requires Node >=20 <21 for its CLI,
      but the package command is not a stdio MCP server. The CLI exposes a
      remote streamable HTTP/SSE endpoint at https://mcp.aka.page/mcp.
    unsupported_tools:
    - name: daiso_check_inventory
      reason: Real remote tool call returned 403 Unauthorized with sample product/store input.
    - name: daiso_get_display_location
      reason: Real remote tool call returned 403 Unauthorized with sample product/store input.
    server_url: https://mcp.aka.page/mcp
    remote_transport_hint: sse
    remote_health_status: ok
    remote_health_checked_at: '2026-04-29T09:27:59.632Z'
    remote_registration_hint: claude mcp add daiso https://mcp.aka.page --transport
      sse
    remote_endpoint_registry_review_status: passed_with_scope_limits
    remote_endpoint_registry_reviewed_at: '2026-04-29T09:51:12+00:00'
    remote_server_info:
      name: multi-service-mcp
      version: 1.0.0
    remote_tool_count: 32
    remote_allowlist_drift_status: passed
    remote_allowlist_drift_checked_at: '2026-04-29T09:51:12+00:00'
    remote_allowlist_missing_tools: []
    remote_allowlist_prefix_mismatches: []
    remote_out_of_scope_tool_count: 29
    remote_out_of_scope_prefixes:
      cgv: 3
      cu: 2
      daiso: 2
      emart24: 3
      gs25: 3
      lottecinema: 3
      lottemart: 2
      megabox: 3
      oliveyoung: 3
      seveneleven: 5
    remote_out_of_scope_daiso_tools:
    - daiso_check_inventory
    - daiso_get_display_location
    risk_review_status: passed_with_scope_limits
    risk_reviewed_at: '2026-04-29T09:51:12+00:00'
    risk_review_summary: Remote endpoint is a multi-service MCP endpoint. CommerceMCPRadar
      production scope is limited to the configured three Daiso read-only tools,
      and the collector invokes only configured tools/resources.
    production_enablement_status: controlled_rollout_enabled
    production_enablement_decision_status: ready_for_controlled_enablement_review
    production_enablement_decision_at: '2026-04-29T10:20:43+00:00'
    production_enablement_recommended_option: controlled_enablement
    production_enablement_source_enabled_after_decision: true
    production_enablement_decision_failed_checks: []
    production_enablement_decision_artifact: _workspace/2026-04-29_cycle42_daiso_enablement_decision.json
    production_enablement_review_notes:
    - Remote MCP endpoint is multi-service, so non-allowlisted tools must remain
      blocked by config.
    - Canary warning is limited to one duplicate product emitted by search and
      price lookup.
    - Controlled enablement is active and must be rolled back if monitoring
      thresholds are exceeded.
    production_rollout_options:
    - name: stay_disabled
      status: rollback_available
    - name: manual_canary_only
      status: rollback_available
    - name: controlled_enablement
      status: active
    production_rollout_status: active
    production_rollout_enabled_at: '2026-04-29T10:37:07+00:00'
    production_rollout_preflight_artifact: _workspace/2026-04-29_cycle43_daiso_rollout_preflight_canary.json
    production_rollout_validation_artifact: _workspace/2026-04-29_cycle43_daiso_controlled_rollout_validation.json
    production_rollout_monitored_at: '2026-04-29T11:32:49+00:00'
    production_rollout_monitor_artifact: _workspace/2026-04-29_cycle46_mcp_controlled_rollout_monitor.json
    production_deduplication_status: active
    production_deduplicated_at: '2026-04-29T11:32:49+00:00'
    production_canary_status: passed_with_warnings
    production_canary_tested_at: '2026-04-29T10:07:04+00:00'
    production_canary_article_count: 11
    production_canary_non_empty_summary_count: 11
    production_canary_exact_fallback_link_count: 0
    production_canary_duplicate_link_count: 1
    production_canary_duplicate_title_count: 1
    production_canary_source_names:
    - hmmhmmhm/daiso-mcp
    production_canary_categories:
    - commerce_mcp
    production_canary_warnings:
    - Product search and price lookup can emit the same product, producing one
      duplicate normalized title/link pair in the canary run.
    production_monitoring_metrics:
      min_article_count: 3
      require_non_empty_summary_count_equals_article_count: true
      max_exact_fallback_link_count: 0
      max_duplicate_link_count: 0
      expected_source_name: hmmhmmhm/daiso-mcp
      expected_category: commerce_mcp
    production_rollback_criteria:
    - canary_execution_error
    - missing_configured_tool
    - non_empty_summary_count_below_article_count
    - exact_fallback_link_count_above_zero
    - duplicate_link_count_above_zero
    - unexpected_source_or_category
    production_collection_cadence: controlled_low_frequency_rollout
    metadata_checked_at: '2026-05-07T05:20:56+00:00'
    metadata_refresh_status: passed
    metadata_refresh_artifact: _workspace/2026-05-07_mcp_github_repository_metadata_refresh.json
